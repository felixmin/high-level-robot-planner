# @package data

backend: lerobot_v3

loader:
  batch_size: 64
  num_workers: 8
  pin_memory: true
  prefetch_factor: 2

preprocess:
  image_size: 256
  return_metadata: true

request:
  image_requests:
    primary:
      deltas_steps: [0, 5]
      required: true
  state_request: null
  action_request: null
  include_task_text: true
  include_subtask_text: false
  include_metadata: true
  pad_missing_future: true
  image_size:
    - ${data.preprocess.image_size}
    - ${data.preprocess.image_size}
  image_dtype: uint8

output_format: raw

adapter:
  lerobot_v3:
    seed: 42
    steps_per_epoch: 5000
    resample_each_epoch: true
    weights_mode: explicit

filtering:
  enabled: false
  mode: none
  apply_at_sampling: false
  trim_episode_ends: true

  motion:
    enabled: false
    method: frame_diff
    frame_gap: null
    decode_backend: null
    decode_chunk_size: 16
    prefetch_next_episode: false
    prefetch_chunk_size: 16
    device: cpu
    aggregate_all_cameras: false
    aggregate_reduce: mean
    resize_short_side: 224
    grayscale: true
    blur_kernel: 5
    diff_pixel_threshold: 0.03
    smoothing_window: 5
    consecutive_active_k: 3
    low_threshold: 0.01
    high_threshold: 0.02
    use_hysteresis: true

    sparse_flow:
      enabled: false
      only_on_uncertain: true
      max_corners: 200
      quality_level: 0.01
      min_distance: 5.0
      win_size: 15
      max_level: 2
      min_tracked_fraction: 0.25
      median_flow_threshold: 0.6

  action:
    enabled: false
    method: norm
    threshold: 0.02
    exclude_dims: []
    chunk_size: 1
    chunk_reduce: max
    min_nonzero_ratio: 0.0

  cache:
    enabled: true
    reuse_if_config_unchanged: true
    force_recompute: false
