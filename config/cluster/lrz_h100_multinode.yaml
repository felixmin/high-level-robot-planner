# LRZ H100 Multi-Node Configuration
# 4+ nodes with 4x H100 GPUs each

name: lrz_h100_multinode

compute:
  num_nodes: 4
  gpus_per_node: 4
  time_limit: "48:00:00"

slurm:
  enabled: true
  partition: lrz-hgx-h100-94x4
  qos: mcml
  account: null

container:
  # Set this in config/user_config/local.yaml to your own imported unified image.
  # See containers/README.md for the build/push/import workflow.
  image: null
  python_bin: /opt/hlrp-venv/bin/python
