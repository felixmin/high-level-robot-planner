# MCML H100 Single Node Configuration
# Single node on MCML H100 partition

name: mcml_a100

compute:
  num_nodes: 1
  gpus_per_node: 1
  time_limit: "15:00:00"

slurm:
  enabled: true
  partition: mcml-dgx-a100-40x8
  qos: mcml
  account: null  # Set if needed

container:
  # Set this in config/user_config/local.yaml to your own imported unified image.
  # See containers/README.md for the build/push/import workflow.
  image: null
  python_bin: /opt/hlrp-venv/bin/python
