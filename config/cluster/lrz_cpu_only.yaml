# LRZ CPU-only single-job configuration
#
# LRZ AI Systems "CPU Nodes" partition:
# - partition: lrz-cpu
# - no GPUs

name: lrz_cpu_only

compute:
  num_nodes: 1
  gpus_per_node: 0
  cpus_per_task: 16
  mem_gb: 128
  time_limit: "08:00:00"

slurm:
  enabled: true
  partition: lrz-cpu
  qos: cpu
  account: null

container:
  # Set this in config/user_config/local.yaml to your own imported unified image.
  # See containers/README.md for the build/push/import workflow.
  image: null
  python_bin: /opt/hlrp-venv/bin/python
