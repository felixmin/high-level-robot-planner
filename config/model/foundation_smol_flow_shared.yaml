# Stage 2 (Foundation) shared-trunk SmolVLM backend:
# - flow-matching latent-vector head (LAQ codebook vectors)
# - real-action head is initialized but not trained in Stage 2

name: vla_smol_flow_shared

backend: smolvla_shared
training_mode: latent_flow

vla:
  model_name: ${smolvla_core.vla.model_name}
  torch_dtype: bf16  # bf16, fp16, fp32
  trust_remote_code: true
  freeze_vlm: true
  freeze_vision_encoder: ${smolvla_core.vla.freeze_vision_encoder}
  load_vlm_weights: ${smolvla_core.vla.load_vlm_weights}
  attention_mode: ${smolvla_core.vla.attention_mode}
  num_expert_layers: ${smolvla_core.vla.num_expert_layers}
  num_vlm_layers: ${smolvla_core.vla.num_vlm_layers}
  self_attn_every_n_layers: ${smolvla_core.vla.self_attn_every_n_layers}
  expert_width_multiplier: ${smolvla_core.vla.expert_width_multiplier}
  add_image_special_tokens: ${smolvla_core.vla.add_image_special_tokens}
  tokenizer_max_length: ${smolvla_core.vla.tokenizer_max_length}
  pad_language_to: ${smolvla_core.vla.pad_language_to}
  max_state_dim: ${smolvla_core.vla.max_state_dim}
  prefix_length: ${smolvla_core.vla.prefix_length}
  use_gpu_preprocessing: ${smolvla_core.vla.use_gpu_preprocessing}
  image_size: ${smolvla_core.vla.image_size}
  camera_keys: ${smolvla_core.vla.camera_keys}
  empty_cameras: ${smolvla_core.vla.empty_cameras}
  normalization_stats: {}

laq:
  checkpoint: ""  # required at runtime (Stage 1 LAQ checkpoint)

action_tokens:
  codebook_size: 2048
  code_seq_len: 1
  action_start: "<ACTION>"
  action_end: "</ACTION>"
  token_fmt: "<ACT_{i}>"

flow:
  action_dim: ${smolvla_core.flow.action_dim}
  action_chunk_size: ${smolvla_core.flow.action_chunk_size}
  flow_hidden_dim: ${smolvla_core.flow.flow_hidden_dim}
  flow_steps: ${smolvla_core.flow.flow_steps}
  latent_loss_weight: 1.0
  action_loss_weight: 0.0
  min_period: ${smolvla_core.flow.min_period}
  max_period: ${smolvla_core.flow.max_period}
  time_beta_alpha: ${smolvla_core.flow.time_beta_alpha}
  time_beta_beta: ${smolvla_core.flow.time_beta_beta}

chat:
  system_prompt: "You are a robot policy."
