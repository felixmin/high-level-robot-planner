# Stage 2 token-based policy model using Cosmos-Reason2 (Qwen3-VL).

name: stage2_policy_cosmos2_tokens

backend: qwen3vl_chat_tokens
training_mode: codes

policy:
  model_name: nvidia/Cosmos-Reason2-2B
  torch_dtype: bf16  # bf16, fp16, fp32
  attn_implementation: sdpa

stage1:
  checkpoint: ""  # required at runtime (Stage 1 LAM checkpoint)

action_tokens:
  codebook_size: 4096  # Must match Stage-1 LAM checkpoint (current: 4096/1, future: 8/4)
  code_seq_len: 1
  action_start: "<ACTION>"
  action_end: "</ACTION>"
  token_fmt: "<ACT_{i}>"

chat:
  system_prompt: "You are a robot policy. Reply only with action tokens."
