# @package _global_

defaults:
  - /model@model: lam
  - /data@data: test2
  - /training@training: stage1_optimizer
  - /validation@validation: stage1_cluster_rich
  - /cluster@cluster: mcml_x100
  - optional /user_config: local

submit:
  script: 2_train_stage1_lam

experiment:
  name: 2026-03-15_18-57-14_stage1_cluster_test2_tiny_lam_ckpt_for_stage3_multitask
  description: "Short cluster Stage 1 run on test2 to produce a valid LAM checkpoint for later Stage 3 multitask training."

logging:
  runs_dir: ${logging.root_dir}/runs/${experiment.name}
  tags: ["stage1", "cluster", "test2", "tiny-ckpt", "lam", "stage3-bootstrap"]

data:
  output_format: stage1

training:
  max_steps: 50
  num_sanity_val_steps: 0
