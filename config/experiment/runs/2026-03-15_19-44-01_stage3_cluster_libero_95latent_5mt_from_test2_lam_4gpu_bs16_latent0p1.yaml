# @package _global_

defaults:
  - _stage3_base
  - /cluster@cluster: lrz_x100
  - /runtime: stage3_cluster
  - optional /user_config: local
  - override /stage3_dataset: libero_5pct_latent_rest_balanced

experiment:
  name: 2026-03-15_19-44-01_stage3_cluster_libero_95latent_5mt_from_test2_lam_4gpu_bs16_latent0p1
  description: "Cluster Stage 3 multitask Libero training on the 95% latent / 5% multitask mix using the tiny test2 Stage-1 checkpoint, 4 GPUs, batch size 16, and latent loss weight 0.1."

logging:
  runs_dir: ${logging.root_dir}/runs/${experiment.name}

artifacts:
  lam_checkpoint_path: /dss/dssmcmlfs01/pn57pi/pn57pi-dss-0001/felix_minzenmay/runs/2026-03-15_18-57-14_stage1_cluster_test2_tiny_lam_ckpt_for_stage3_multitask_mcml/checkpoints/last.ckpt

