# @package _global_

defaults:
  - _stage3_base
  - /cluster@cluster: local_dev
  - /runtime: stage3_local
  - optional /user_config: local
  - override /stage3_profile@stage3_profile: multitask_scratch
  - override /stage3_dataset: libero_5pct_latent_rest_balanced

experiment:
  name: 2026-03-15_01-20-13_stage3_local_libero_95latent_5mt_balanced_bs64_lam50k
  description: "Local Stage 3 Libero training with balanced 95% latent / 5% multitask mixing, batch size 64, and the latest ~50k-step LAM checkpoint"

logging:
  runs_dir: ${logging.root_dir}/runs/${experiment.name}

artifacts:
  lam_checkpoint_path: /mnt/data/workspace/runs_root/runs/2026-03-14_19-27-26_stage1_local/checkpoints/last.ckpt

stage3_profile:
  batch_size: 64
