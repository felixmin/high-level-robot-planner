# @package _global_

defaults:
  - /model/shared@stage2_policy_core: stage2_policy_core
  - /model@model: stage2_smol_flow_shared
  - /data@data: octo24
  - /training@training: stage2_policy_lightning
  - /cluster@cluster: local_dev
  - optional /user_config: local

experiment:
  name: latent_smolvla
  description: "SmolVLM shared trunk with SmolVLA-style latent flow pretraining (Stage 2)"

submit:
  script: 4_train_stage2_policy

data:
  loader:
    batch_size: 128
  output_format: stage2

training:
  max_steps: 200000
  max_epochs: 1000
  accumulate_grad_batches: 2
  validation:
    check_interval: 1000
  checkpoint:
    every_n_train_steps: 1000
  train_visualization:
    every_n_steps: 1000
  profiler:
    enabled: false

logging:
  use_wandb: true
  tags: ["stage2", "smol", "flow", "latent"]
