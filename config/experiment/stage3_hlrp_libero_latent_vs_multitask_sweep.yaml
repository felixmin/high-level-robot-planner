# @package _global_

defaults:
  - /cluster@cluster: local_dev
  - /runtime: stage3_local
  - /model/shared@stage2_policy_core: stage2_policy_core
  - optional /user_config: local

experiment:
  name: ${latent_split_variants.${variant_id}.experiment_name}
  description: "Stage 3 Libero 3-way sweep: 10% multitask-only vs 100% split (10% multitask + 90% latent-only) vs 100% full multitask baseline"

variant_id: mt10_only

submit:
  script: 6_train_lerobot

cluster:
  container:
    image: /dss/dssmcmlfs01/pn57pi/pn57pi-dss-0001/felix_minzenmay/enroot/hlrp_stage3_lerobot.sqsh
    python_bin: /opt/lerobot-venv/bin/python

sweep:
  params:
    variant_id: mt10_only,mt10_lat100,mt100_full_multitask

latent_split_variants:
  mt10_only:
    experiment_name: stage3_hlrp_libero_10pct_multitask_only
    action_subset_ratio: 0.1
    latent_scope: action_subset
  mt10_lat100:
    experiment_name: stage3_hlrp_libero_100pct_10pct_multitask_90pct_latent
    action_subset_ratio: 0.1
    latent_scope: all
  mt100_full_multitask:
    experiment_name: stage3_hlrp_libero_100pct_full_multitask_baseline
    action_subset_ratio: 1.0
    latent_scope: all

logging:
  use_wandb: true
  tags: ["stage3", "lerobot", "libero", "hlrp-policy", "smolvla", "scratch", "cotrain", "latent-vs-multitask"]

lerobot:
  command: lerobot-train
  install_editables: [lerobot, lerobot_policy_hlrp]

  output_dir: ${logging.runs_dir}/lerobot_smolvla_shared_libero_latent_vs_multitask
  job_name: ${experiment.name}
  steps: 100000
  batch_size: 32
  num_workers: 4
  log_freq: 200
  save_freq: 20000
  use_policy_training_preset: false

  wandb:
    enable: true

  policy:
    type: hlrp_smolvla_shared
    repo_id: felixmin/hlrp_smolvla_shared_libero_latent_vs_multitask
    device: cuda
    push_to_hub: false
    init_mode: scratch
    stage2_artifact: null
    stage3_training_mode: multitask
    action_loss_weight: 1.0
    latent_loss_weight: 1.0
    latent_scope: ${latent_split_variants.${variant_id}.latent_scope}
    action_subset_ratio: ${latent_split_variants.${variant_id}.action_subset_ratio}
    action_subset_key: episode_index
    lam_checkpoint_path: /mnt/data/workspace/code/high-level-robot-planner/runs/2026-02-24_10-41-51_lam_oxe_local/checkpoints/last.ckpt
    lam_future_frames: 10
    lam_camera_keys: [observation.images.image]
    model_name: ${stage2_policy_core.policy.model_name}
    load_vlm_weights: ${stage2_policy_core.policy.load_vlm_weights}
    train_expert_only: true
    freeze_vision_encoder: ${stage2_policy_core.policy.freeze_vision_encoder}
    attention_mode: ${stage2_policy_core.policy.attention_mode}
    num_expert_layers: ${stage2_policy_core.policy.num_expert_layers}
    num_vlm_layers: ${stage2_policy_core.policy.num_vlm_layers}
    self_attn_every_n_layers: ${stage2_policy_core.policy.self_attn_every_n_layers}
    expert_width_multiplier: ${stage2_policy_core.policy.expert_width_multiplier}
    add_image_special_tokens: ${stage2_policy_core.policy.add_image_special_tokens}
    max_state_dim: ${stage2_policy_core.policy.max_state_dim}
    prefix_length: ${stage2_policy_core.policy.prefix_length}
    use_gpu_preprocessing: ${stage2_policy_core.policy.use_gpu_preprocessing}
    image_size: ${stage2_policy_core.policy.image_size}
    empty_cameras: ${stage2_policy_core.policy.empty_cameras}
    latent_vector_dim: ${stage2_policy_core.latent.latent_vector_dim}
    max_action_dim: ${stage2_policy_core.flow.max_action_dim}
    flow_hidden_dim: ${stage2_policy_core.flow.flow_hidden_dim}
    flow_steps: ${stage2_policy_core.flow.flow_steps}
    chunk_size: ${stage2_policy_core.flow.chunk_size}
    tokenizer_max_length: ${stage2_policy_core.policy.tokenizer_max_length}
    pad_language_to: ${stage2_policy_core.policy.pad_language_to}
    n_action_steps: ${stage2_policy_core.flow.chunk_size}
    min_period: ${stage2_policy_core.flow.min_period}
    max_period: ${stage2_policy_core.flow.max_period}
    time_beta_alpha: ${stage2_policy_core.flow.time_beta_alpha}
    time_beta_beta: ${stage2_policy_core.flow.time_beta_beta}

  dataset:
    repo_id: HuggingFaceVLA/libero
    episodes: null
    root: null
    use_imagenet_stats: false
    video_backend: pyav

  env:
    type: libero
    task: libero_10
    observation_height: 512
    observation_width: 512

  optimizer:
    type: adamw
    betas: [0.9, 0.95]

  scheduler:
    type: cosine_decay_with_warmup
    num_warmup_steps: 100
    num_decay_steps: 99900
    peak_lr: 1e-4
    decay_lr: 2.5e-6

  eval:
    freq: 20000
    batch_size: 2
    n_episodes: 10
